<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курсы группы</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/group-courses.css">
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/toast.css">
</head>
<body>
    <header class="header" id="header"></header>

    <main class="main-group-courses">
        <div class="group-courses-container">
            <h1 class="group-courses__title" id="groupTitle">Группа - Загрузка...</h1>
            
            <div class="group-courses__actions" id="groupCoursesActions">
                <button id="createCourseBtn" class="btn btn-primary">Создать курс</button>
            </div>

            <div class="courses__list" id="coursesList">
                <!-- js -->
            </div>
        </div>
    </main>

    <div id="courseModal" class="modal" style="display: none;">
        <div class="modal__container modal__container--large">
            <div class="modal__header">
                <h2 class="modal__title">Создание курса</h2>
                <button class="modal__close" id="closeCourseModal">&times;</button>
            </div>
            <div class="modal__divider"></div>
            
            <div class="modal__body">
                <div class="form-field">
                    <label class="form-field__label">Название курса</label>
                    <input type="text" id="courseName" class="form-field__input" placeholder="Введите название курса">
                </div>

                <div class="form-field">
                    <label class="form-field__label">Год начала курса</label>
                    <input type="text" id="courseYear" class="form-field__input" placeholder="Например: 2024">
                </div>

                <div class="form-field">
                    <label class="form-field__label">Общее количество мест</label>
                    <input type="number" id="courseSeats" class="form-field__input" placeholder="Например: 30">
                </div>

                <div class="form-field">
                    <label class="form-field__label">Семестр</label>
                    <div class="radio-group">
                        <label class="radio-group__item">
                            <input type="radio" name="semester" value="Autumn" class="radio-group__radio">
                            <span class="radio-group__label">Осенний</span>
                        </label>
                        <label class="radio-group__item">
                            <input type="radio" name="semester" value="Spring" class="radio-group__radio">
                            <span class="radio-group__label">Весенний</span>
                        </label>
                    </div>
                </div>

                <div class="form-field">
                    <label class="form-field__label">Требования</label>
                    <div class="editor-container">
                        <div class="editor-toolbar">
                            <button type="button" class="editor-toolbar__btn" data-command="bold" title="Жирный"><b>B</b></button>
                            <button type="button" class="editor-toolbar__btn" data-command="italic" title="Курсив"><i>I</i></button>
                            <button type="button" class="editor-toolbar__btn" data-command="underline" title="Подчеркнутый"><u>U</u></button>
                            <button type="button" class="editor-toolbar__btn" data-command="strikeThrough" title="Зачеркнутый"><s>S</s></button>
                            
                            <span class="editor-toolbar__divider"></span>
                            
                            <div class="editor-toolbar__highlight-picker">
                                <button type="button" class="editor-toolbar__color-btn editor-toolbar__color-btn--yellow" data-highlight="#fff3cd" title="Жёлтый маркер"></button>
                                <button type="button" class="editor-toolbar__color-btn editor-toolbar__color-btn--green" data-highlight="#d1e7dd" title="Зелёный маркер"></button>
                                <button type="button" class="editor-toolbar__color-btn editor-toolbar__color-btn--blue" data-highlight="#cfe2ff" title="Голубой маркер"></button>
                                <button type="button" class="editor-toolbar__color-btn editor-toolbar__color-btn--pink" data-highlight="#f8d7da" title="Розовый маркер"></button>
                                <button type="button" class="editor-toolbar__color-btn editor-toolbar__color-btn--none" data-highlight="transparent" title="Убрать выделение"></button>
                            </div>
                            
                            <span class="editor-toolbar__divider"></span>
                            
                            <button type="button" class="editor-toolbar__btn" data-command="insertUnorderedList" title="Маркированный список">•</button>
                            <button type="button" class="editor-toolbar__btn" data-command="insertOrderedList" title="Нумерованный список">1.</button>
                            
                            <span class="editor-toolbar__divider"></span>
                            
                            <button type="button" class="editor-toolbar__btn" data-command="createLink" title="Вставить ссылку">🔗</button>
                            <button type="button" class="editor-toolbar__btn" data-command="insertImage" title="Вставить картинку">🖼️</button>
                            
                            <span class="editor-toolbar__divider"></span>
                            
                            <button type="button" class="editor-toolbar__btn" data-command="removeFormat" title="Очистить формат">✖</button>
                            <button type="button" class="editor-toolbar__btn" data-command="selectAll" title="Выделить всё">⬜</button>
                            <button type="button" class="editor-toolbar__btn" data-command="delete" title="Удалить выделенное">🗑️</button>
                        </div>
                        <div id="requirementsEditor" class="editor-content" contenteditable="true" placeholder="Введите требования к курсу..."></div>
                        <div class="editor-resize" id="requirementsResize"></div>
                    </div>
                </div>

                <div class="form-field">
                    <label class="form-field__label">Аннотации</label>
                    <div class="editor-container">
                        <div class="editor-toolbar">
                            <button type="button" class="editor-toolbar__btn" data-command="bold" title="Жирный"><b>B</b></button>
                            <button type="button" class="editor-toolbar__btn" data-command="italic" title="Курсив"><i>I</i></button>
                            <button type="button" class="editor-toolbar__btn" data-command="underline" title="Подчеркнутый"><u>U</u></button>
                            <button type="button" class="editor-toolbar__btn" data-command="strikeThrough" title="Зачеркнутый"><s>S</s></button>
                            
                            <span class="editor-toolbar__divider"></span>
                            
                            <div class="editor-toolbar__highlight-picker">
                                <button type="button" class="editor-toolbar__color-btn editor-toolbar__color-btn--yellow" data-highlight="#fff3cd" title="Жёлтый маркер"></button>
                                <button type="button" class="editor-toolbar__color-btn editor-toolbar__color-btn--green" data-highlight="#d1e7dd" title="Зелёный маркер"></button>
                                <button type="button" class="editor-toolbar__color-btn editor-toolbar__color-btn--blue" data-highlight="#cfe2ff" title="Голубой маркер"></button>
                                <button type="button" class="editor-toolbar__color-btn editor-toolbar__color-btn--pink" data-highlight="#f8d7da" title="Розовый маркер"></button>
                                <button type="button" class="editor-toolbar__color-btn editor-toolbar__color-btn--none" data-highlight="transparent" title="Убрать выделение"></button>
                            </div>
                            
                            <span class="editor-toolbar__divider"></span>
                            
                            <button type="button" class="editor-toolbar__btn" data-command="insertUnorderedList" title="Маркированный список">•</button>
                            <button type="button" class="editor-toolbar__btn" data-command="insertOrderedList" title="Нумерованный список">1.</button>
                            
                            <span class="editor-toolbar__divider"></span>
                            
                            <button type="button" class="editor-toolbar__btn" data-command="createLink" title="Вставить ссылку">🔗</button>
                            <button type="button" class="editor-toolbar__btn" data-command="insertImage" title="Вставить картинку">🖼️</button>
                            
                            <span class="editor-toolbar__divider"></span>
                            
                            <button type="button" class="editor-toolbar__btn" data-command="removeFormat" title="Очистить формат">✖</button>
                            <button type="button" class="editor-toolbar__btn" data-command="selectAll" title="Выделить всё">⬜</button>
                            <button type="button" class="editor-toolbar__btn" data-command="delete" title="Удалить выделенное">🗑️</button>
                        </div>
                        <div id="annotationsEditor" class="editor-content" contenteditable="true" placeholder="Введите аннотацию к курсу..."></div>
                        <div class="editor-resize" id="annotationsResize"></div>
                    </div>
                </div>

                <div class="form-field">
                    <label class="form-field__label">Основной преподаватель курса</label>
                    <select id="mainTeacher" class="form-field__select">
                        <option value="">Выберите преподавателя</option>
                    </select>
                </div>
            </div>
            
            <div class="modal__divider"></div>
            <div class="modal__footer">
                <button id="cancelCourseBtn" class="btn btn-secondary">Отмена</button>
                <button id="saveCourseBtn" class="btn btn-primary">Создать</button>
            </div>
        </div>
    </div>
    <script src="js/common.js"></script>
    <script src="js/group-courses.js"></script>
    <script src="js/toast.js"></script>
</body>
</html>
